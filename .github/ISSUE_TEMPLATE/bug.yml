name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open click
        2. Click ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: Chrome 120, Firefox 122, Safari 17, ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14.5, Windows 11, Ubuntu 24.04, iOS 18, Android 14, ...
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: shell
