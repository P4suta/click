version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      core:
        patterns: ["typescript", "@biomejs/biome", "vitest", "@vitest/*", "fast-check"]
      web:
        patterns: ["solid-js", "vite", "vite-plugin-*", "@solidjs/*", "happy-dom", "workbox-*"]
