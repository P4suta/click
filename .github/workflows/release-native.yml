name: Release native binaries

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.10
  GO_VERSION: "1.22"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun --filter '@click/web' build

      - name: Sync web dist into Wails frontend
        shell: bash
        run: |
          mkdir -p native/frontend
          rm -rf native/frontend/dist
          cp -r packages/web/dist native/frontend/dist

      - name: Wails build
        working-directory: native
        env:
          OS_NAME: ${{ matrix.os }}
        run: wails build -clean -o "click-$OS_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: click-${{ matrix.os }}
          path: native/build/bin/
          retention-days: 14

  release:
    name: Attach to GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
