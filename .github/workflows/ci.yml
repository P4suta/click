name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.11
  # Opt into Node.js 24 for any JavaScript action that still ships with a
  # Node 20 entrypoint. As of 2026-04 this is needed because some actions
  # (notably actions/deploy-pages@v5 transitively pinning an older
  # actions/upload-artifact SHA) still target Node 20. GitHub will force
  # this on by default starting 2026-06-02 — flipping it now makes the
  # transition surface in CI early instead of later.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [core, web]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Run tests with coverage
        env:
          PKG: ${{ matrix.package }}
        run: bun --filter "@click/$PKG" test:coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build with GitHub Pages base path
        env:
          VITE_BASE_PATH: /click/
        run: bun run build
      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: packages/web/dist/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build for Pages
        env:
          VITE_BASE_PATH: /click/
        run: bun run build
      - uses: actions/configure-pages@v6
      # Inline what `actions/upload-pages-artifact@v4` does, because that
      # composite action internally pins `actions/upload-artifact@v4.6.2`
      # which still targets Node 20. Inlining lets us use upload-artifact@v7
      # (Node 24 native) and eliminate the last Node 20 deprecation warning.
      # Mirrors the upstream composite tar invocation verbatim so the
      # resulting artifact is byte-equivalent for actions/deploy-pages.
      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory packages/web/dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
      - id: deployment
        uses: actions/deploy-pages@v5
